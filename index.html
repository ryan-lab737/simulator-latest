<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ Pro Football Simulator - Live Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;900&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04080f; --surface: #080e1a; --accent: #00e5ff;
            --border: #1a2a40; --text: #e8f4ff; --home: #00c4ff; --away: #ff7b00;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; margin: 0; }
        
        /* 대시보드 컨테이너 */
        .dashboard-container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .live-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        /* 경기 카드 스타일 */
        .match-card {
            background: #0c1422;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            transition: 0.3s;
        }
        .match-card:hover { border-color: var(--accent); }
        .league-name { font-size: 12px; color: var(--accent); font-weight: bold; margin-bottom: 5px; }
        .teams { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1em; }
        .score-row { display: flex; justify-content: center; align-items: center; margin: 10px 0; font-size: 24px; font-family: 'Barlow Condensed'; }
        .xg-info { text-align: center; font-size: 13px; color: #4a6a8a; margin-bottom: 10px; }
        .prob-bar-container { height: 8px; background: #1a2a40; border-radius: 4px; overflow: hidden; display: flex; margin: 10px 0; }
        .prob-home { background: var(--home); height: 100%; }
        .prob-away { background: var(--away); height: 100%; }
        .odds-row { display: flex; justify-content: space-around; font-size: 12px; background: #04080f; padding: 5px; border-radius: 4px; }
        
        button.refresh-btn {
            background: var(--accent); color: #000; border: none; padding: 8px 16px;
            border-radius: 5px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="dashboard-header">
        <h2>LIVE PROBABILITY BOARD</h2>
        <button class="refresh-btn" onclick="updateAllData()">데이터 새로고침</button>
    </div>
    
    <div id="live-grid" class="live-grid">
        <p style="text-align:center; width:100%;">API 데이터를 불러오는 중...</p>
    </div>
</div>

<script>
    // API 설정 (여기에 본인의 키를 입력하세요)
    const FOOTBALL_API_KEY = 'YOUR_FOOTBALL_API_KEY';
    const ODDS_API_KEY = 'YOUR_ODDS_API_KEY';

    async function updateAllData() {
        try {
            // 1. Football API: 실시간 경기 및 xG 데이터 (EPL 기준 예시)
            const liveResponse = await fetch('https://v3.football.api-sports.io/fixtures?live=all&league=39', {
                headers: { 'x-apisports-key': FOOTBALL_API_KEY }
            });
            const liveData = await liveResponse.json();

            // 2. Odds API: 최신 배당률
            const oddsResponse = await fetch(`https://api.the-odds-api.com/v4/sports/soccer_epl/odds/?regions=eu&markets=h2h&apiKey=${ODDS_API_KEY}`);
            const oddsData = await oddsResponse.json();

            renderDashboard(liveData.response, oddsData);
        } catch (error) {
            console.error("데이터 로드 중 오류 발생:", error);
            document.getElementById('live-grid').innerHTML = "API 호출 제한이거나 키가 잘못되었습니다.";
        }
    }

    function renderDashboard(matches, oddsList) {
        const grid = document.getElementById('live-grid');
        grid.innerHTML = '';

        matches.forEach(match => {
            const homeName = match.teams.home.name;
            const awayName = match.teams.away.name;
            
            // 실시간 스탯 추출 (xG 등)
            const homeXG = match.statistics?.[0]?.expected_goals || "0.00";
            const awayXG = match.statistics?.[1]?.expected_goals || "0.00";
            
            // 시장 배당 찾기
            const matchOdds = oddsList.find(o => o.home_team.includes(homeName) || homeName.includes(o.home_team));
            const marketOdds = matchOdds ? matchOdds.bookmakers[0]?.markets[0]?.outcomes : null;

            // 시뮬레이션 확률 계산 (가상의 로직 - 사용자의 기존 xG 공식 대입 가능)
            const hProb = calculateLiveProbability(homeXG, awayXG);
            const aProb = 100 - hProb;

            const card = document.createElement('div');
            card.className = 'match-card';
            card.innerHTML = `
                <div class="league-name">${match.league.name} - ${match.fixture.status.elapsed}'</div>
                <div class="teams">
                    <span>${homeName}</span>
                    <span>${awayName}</span>
                </div>
                <div class="score-row">
                    <span>${match.goals.home}</span>
                    <span style="margin:0 15px; font-size:14px; color:#4a6a8a;">VS</span>
                    <span>${match.goals.away}</span>
                </div>
                <div class="xg-info">Live xG: ${homeXG} - ${awayXG}</div>
                <div class="prob-bar-container">
                    <div class="prob-home" style="width: ${hProb}%"></div>
                    <div class="prob-away" style="width: ${aProb}%"></div>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:10px;">
                    <span>예상승률 ${hProb}%</span>
                    <span>예상승률 ${aProb}%</span>
                </div>
                <div class="odds-row">
                    <span>배당 H: ${marketOdds ? marketOdds[0].price : '-'}</span>
                    <span>D: ${marketOdds ? marketOdds[2].price : '-'}</span>
                    <span>A: ${marketOdds ? marketOdds[1].price : '-'}</span>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // 간단한 xG 기반 승률 계산 함수 (Poisson 분포 등으로 확장 가능)
    function calculateLiveProbability(hXG, aXG) {
        const h = parseFloat(hXG);
        const a = parseFloat(aXG);
        if (h + a === 0) return 50;
        return Math.round((h / (h + a)) * 100);
    }

    // 초기 실행
    // updateAllData(); 
</script>

</body>
</html>
